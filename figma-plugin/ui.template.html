<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SuperScan UI Bridge</title>
  <style>
    :root { --primary: #00b4ed; --bg: #ffffff; --text: #333333; --border: #e2e8f0; }
    body { font-family: 'Inter', sans-serif; padding: 20px; margin: 0; color: var(--text); background: #fcfcfc; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    h2 { font-size: 16px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
    
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      transition: all 0.2s;
      background: white;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .drop-zone:hover { border-color: var(--primary); background: #f0faff; }
    .drop-zone.has-file { border-style: solid; border-color: #10b981; background: #f0fdf4; }
    
    .file-info { font-size: 11px; color: #64748b; margin-top: 8px; }
    .btn-select { font-size: 12px; font-weight: 600; color: var(--primary); text-decoration: underline; }

    .screen-list { max-height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: white; margin-bottom: 20px; }
    .category-title { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; padding: 12px 12px 4px; background: #f8fafc; }
    .screen-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
    .screen-name { font-size: 11px; font-weight: 500; }
    
    .switch { position: relative; width: 34px; height: 18px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; transition: .3s; border-radius: 18px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background: var(--primary); }
    input:checked + .slider:before { transform: translateX(16px); }

    .actions { position: sticky; bottom: 0; background: #fcfcfc; padding-top: 10px; }
    button#import-btn { 
      width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 10px; 
      font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    button#import-btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    
    #loading { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); z-index: 100; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
    input[type="file"] { display: none; }
    
    .footer { font-size: 10px; color: #94a3b8; text-align: center; margin-top: 24px; padding-bottom: 10px; }
    .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div id="loading">Processing UI Data...</div>

  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    <h2>SuperScan UI Bridge</h2>
  </div>

  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-picker').click()">
    <span class="btn-select">Click to load ui-structure.json</span>
    <div class="file-info" id="file-name">No file selected</div>
    <input type="file" id="file-picker" accept=".json">
  </div>

  <div id="screen-list-container" style="display: none;">
    <div class="screen-list" id="screen-list"></div>
    <div class="actions">
      <button id="import-btn" disabled>Import Selected to Figma</button>
    </div>
  </div>

  <div class="footer">
    SuperScan v4.0 • Built by <a href="https://github.com/coviyarce" target="_blank">Luis Covilla (Coviyarce)</a>
  </div>

  <script>
    let currentData = null;
    const filePicker = document.getElementById('file-picker');
    const screenList = document.getElementById('screen-list');
    const importBtn = document.getElementById('import-btn');
    const container = document.getElementById('screen-list-container');
    const dropZone = document.getElementById('drop-zone');

    function renderScreens(data) {
      screenList.innerHTML = '';
      const categories = {};
      Object.keys(data).forEach(id => {
        const screen = data[id];
        const cat = screen.category || 'Screens';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push({ id, ...screen });
      });

      Object.keys(categories).forEach(cat => {
        const catDiv = document.createElement('div');
        catDiv.innerHTML = `<div class="category-title">${cat}</div>`;
        categories[cat].forEach(screen => {
          const item = document.createElement('div');
          item.className = 'screen-item';
          item.innerHTML = `
            <span class="screen-name">${screen.name || screen.id}</span>
            <label class="switch">
              <input type="checkbox" class="screen-cb" data-id="${screen.id}">
              <span class="slider"></span>
            </label>
          `;
          catDiv.appendChild(item);
        });
        screenList.appendChild(catDiv);
      });

      container.style.display = 'block';
      
      document.querySelectorAll('.screen-cb').forEach(cb => {
        cb.onchange = () => {
          importBtn.disabled = !Array.from(document.querySelectorAll('.screen-cb:checked')).length;
        };
      });
    }

    filePicker.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      document.getElementById('loading').style.display = 'flex';
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          currentData = JSON.parse(event.target.result);
          renderScreens(currentData);
          document.getElementById('file-name').textContent = file.name;
          dropZone.classList.add('has-file');
        } catch (err) {
          alert('Invalid JSON file.');
        }
        document.getElementById('loading').style.display = 'none';
      };
      reader.readAsText(file);
    };

    importBtn.onclick = () => {
      const selectedIds = Array.from(document.querySelectorAll('.screen-cb:checked'))
        .map(cb => cb.getAttribute('data-id'));
      
      parent.postMessage({ 
        pluginMessage: { 
          type: 'import', 
          ids: selectedIds, 
          dataOverride: currentData 
        } 
      }, '*');
    };

    // Auto-load injected data if present
    const injectedData = __CAPTURED_DATA__;
    if (injectedData && Object.keys(injectedData).length > 0) {
      currentData = injectedData;
      renderScreens(currentData);
      document.getElementById('file-name').textContent = 'Workspace Context Loaded';
      dropZone.classList.add('has-file');
    }
  </script>
</body>
</html>
